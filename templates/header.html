<header class="navbar">
    <a href="{{ url_for('home') }}" class="logo">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Gpa Calculator College Logo" style="height: 50px; vertical-align: middle; margin-right: 10px;">
        <span data-translate="brandName" style="vertical-align: middle; position: relative; top: 1px;">Gpa Calculator College</span>
    </a>
    
    <button class="menu-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav class="nav-menu">
        <ul style="font-size: 13px;">
            {% if lang_code == 'en' %}
            <li><a href="{{ url_for('gpa_calculator_en') }}">GPA Calculator</a></li>
            <li><a href="{{ url_for('highschool_gpa_en') }}">High School GPA</a></li>
            <li><a href="{{ url_for('grade_calculator_en') }}">Grade Calculator</a></li>
            <li><a href="{{ url_for('prior_semester_gpa_en') }}">Final GPA Calculate</a></li>
            {% else %}
            <li><a href="{{ url_for('lang_routes.gpa_calculator', lang_code=lang_code) }}">GPA Calculator</a></li>
            <li><a href="{{ url_for('lang_routes.highschool_gpa', lang_code=lang_code) }}">High School GPA</a></li>
            <li><a href="{{ url_for('lang_routes.grade_calculator', lang_code=lang_code) }}">Grade Calculator</a></li>
            <li><a href="{{ url_for('lang_routes.prior_semester_gpa', lang_code=lang_code) }}">Final GPA Calculate</a></li>
            {% endif %}
            <li class="language-switcher-container">
                <select id="language-switcher" style="width: 120px;">
                    <option value="en">English</option>
                    <option value="ar">Arabic</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="es">Spanish</option>
                    <option value="de">German</option>
                </select>
            </li>
            <li>
                <button id="theme-toggle-btn" style="background:none; border:none; cursor:pointer; font-size: 20px; vertical-align: middle;">
                    <span id="theme-icon">☀️</span>
                </button>
            </li>
        </ul>
    </nav>
</header>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const menuToggle = document.querySelector('.menu-toggle');
        const navMenu = document.querySelector('.nav-menu');
        const languageSwitcher = document.getElementById('language-switcher');
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;
        
        // Language switcher ki functionality
        languageSwitcher.value = "{{ lang_code }}"; // Current language ko select karega
        
        languageSwitcher.addEventListener('change', function() {
            const selectedLang = this.value;
            let currentPath = window.location.pathname;

            // URL ke aakhir se trailing slash remove karein
            if (currentPath.length > 1 && currentPath.endsWith('/')) {
                currentPath = currentPath.slice(0, -1);
            }

            let pathSegments = currentPath.split('/').filter(p => p !== '');
            let currentPage = '';

            // Agar pehla segment lang code hai, to usay hata do.
            if (pathSegments.length > 0 && pathSegments[0].length === 2 && ['en', 'ar', 'es', 'de', 'pt', 'ru'].includes(pathSegments[0])) {
                currentPage = '/' + pathSegments.slice(1).join('/');
            } else {
                currentPage = currentPath;
            }

            // New URL banayein
            let newPath;
            if (selectedLang === 'en') {
                newPath = currentPage;
            } else {
                // Agar currentPage sirf '/' hai to sirf lang code add karein.
                if (currentPage === '/') {
                    newPath = `/${selectedLang}`;
                } else {
                    newPath = `/${selectedLang}${currentPage}`;
                }
            }
            
            window.location.href = newPath;
        });

        // Menu toggle ki functionality
        menuToggle.addEventListener('click', function() {
            navMenu.classList.toggle('active');
            menuToggle.classList.toggle('active');
        });

        // Dark/Light Mode functionality
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.classList.add(savedTheme);
            themeIcon.textContent = savedTheme === 'dark-mode' ? '🌙' : '☀️';
        } else {
            body.classList.add('light-mode');
            themeIcon.textContent = '☀️';
        }

        themeToggleBtn.addEventListener('click', function() {
            if (body.classList.contains('dark-mode')) {
                body.classList.replace('dark-mode', 'light-mode');
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'light-mode');
            } else {
                body.classList.replace('light-mode', 'dark-mode');
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'dark-mode');
            }
        });
    });
</script>
